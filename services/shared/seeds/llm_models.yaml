schema_version: 1
doc: Single source of truth for LLM models offered by BenGER. Edit this file, then on next API start the seed will upsert any new/changed entries and deactivate any rows whose id is no longer listed. To force re-apply without restarting, POST /api/admin/llm-models/reseed (superadmin) or run `make reseed-llm-models`.
models:
  - id: gpt-5.6-sol
    name: GPT-5.6 Sol
    description: Flagship of the GPT-5.6 family (GA 2026-07-09), 1.05M context
    provider: OpenAI
    model_type: chat
    capabilities: [text-generation, data-synthesis, reasoning, multimodal, advanced-reasoning]
    is_active: true
    input_cost_per_million: 5.0
    output_cost_per_million: 30.0
    constraints:
      temperature:
        supported: false
        required_value: 1.0
        reason: OpenAI GPT-5 series enforces temperature=1.0 via API
      max_tokens:
        default: 8000
      unsupported_params: [top_p, presence_penalty, frequency_penalty, logprobs, top_logprobs, logit_bias]
      reproducibility_impact: CRITICAL
      benchmark_notes: Run multiple iterations (n>=5) and report variance. Results cannot be deterministic. Prompts >272K tokens bill at 2x input / 1.5x output — flat cost map under-reports long-context runs.
      seed:
        supported: false
    recommended_parameters:
      default:
        temperature: 1.0
        max_tokens: 8000
      provenance:
        source: https://developers.openai.com/api/docs/models/gpt-5.6-sol
        retrieved: '2026-07-16'
