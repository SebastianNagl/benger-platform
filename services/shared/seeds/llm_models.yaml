  - id: gpt-5.5-pro
    name: GPT-5.5 Pro
    description: Highest-tier GPT-5.5 with maximum reasoning
    provider: OpenAI
    model_type: chat
    capabilities: [text-generation, data-synthesis, reasoning, multimodal, advanced-reasoning]
    is_active: true
    input_cost_per_million: 30.0
    output_cost_per_million: 180.0
    default_config:
      reasoning_config:
        parameter: reasoning_effort
        type: select
        values: [low, medium, high]
        default: medium
        label: Thinking/Reasoning Level
    constraints:
      temperature:
        supported: false
        required_value: 1.0
        reason: OpenAI GPT-5 series enforces temperature=1.0 via API
      # Pro reasoning tiers consume reasoning tokens against
      # max_output_tokens; 8000 left zero room for visible text on a
      # complex Sachverhalt (observed 2026-05-08: completion_tokens=8000,
      # finish_reason=max_output_tokens, content=""). Matched to o3-pro's
      # default for parity across Pro reasoning tiers.
      max_tokens:
        default: 32000
      unsupported_params: [top_p, presence_penalty, frequency_penalty, logprobs, top_logprobs, logit_bias]
      reproducibility_impact: CRITICAL
      benchmark_notes: Run multiple iterations (n>=5) and report variance. Results cannot be deterministic.
      seed:
        supported: false
    recommended_parameters:
      default:
        temperature: 1.0
        max_tokens: 32000
        # `high` (OpenAI's API default for *-pro) reliably exhausts the
        # full max_tokens budget on hidden reasoning, leaving no room
        # for visible answer text. `medium` finishes in ~5 min on a
        # complex German legal Sachverhalt with content present.
        reasoning_effort: medium
      provenance:
        source: https://platform.openai.com/docs/guides/reasoning
        retrieved: '2026-05-08'
