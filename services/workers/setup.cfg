[mutmut]
# Mutation testing config (meaningful-coverage program / mutation co-gate).
# Scope = crown-jewel PURE modules only. Mutating the whole workers package
# (Celery tasks, AI clients, DB layer) would be slow AND noisy (IO mutants
# survive trivially). Start scoped to statistics.py for the spike; the full
# rollout appends inter_annotator_agreement.py, response_parser.py,
# generation_structure_parser.py, sample_evaluator.py (one module per CI shard
# via the --paths-to-mutate override).
paths_to_mutate=ml_evaluation/statistics.py
tests_dir=tests/
# CRITICAL: -o addopts= neutralizes pytest.ini's `--cov-fail-under=90`. Without
# it EVERY mutant test-run "fails" the coverage gate and mutmut reports a false
# kill. --no-cov drops coverage instrumentation overhead; the runner is scoped
# to ONLY the statistics tests so each mutant runs ~80 fast asserts, not the
# whole 2400-test suite.
runner=python -m pytest -x -q --no-cov -o addopts= -p no:cacheprovider tests/test_statistics.py tests/test_statistics_branches.py tests/test_statistics_coverage.py tests/test_statistics_properties.py tests/test_statistics_mutation_kills.py
