# Workers Service pytest Configuration
# This file extends the unified configuration from /config/base/pytest.ini
# Service-specific overrides can be added below

[pytest]
# Inherit from base configuration - using modern pytest configuration format
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Workers service specific test execution
#
# COVERAGE RATCHET (benger-extended issue #33): floor = measured baseline.
# RE-BASED 2026-06-15 from 83 -> 70: the old 83.80% counted TEST FILES as
# source (the [coverage:run] omit below lived in pytest.ini, which
# coverage.py ignores). A real .coveragerc now omits tests, so the number
# reflects REAL source. Ratcheted to 89 on 2026-06-15: measured 89.40%
# line+branch (2386 passed / 2 skipped) after the tasks.py orchestration-branch
# backfill (recompute_aggregates, update_report_annotations_async,
# _fail_import_job, _run_immediate_config_job, _evaluate_llm_judge_single
# multi-dim) on top of the llm_judge/sample_evaluator/model_parameter work.
# The 4 big Celery entrypoints stay excluded (.coveragerc exclude_also).
# Bump with every test-adding PR; never lower without an issue-#33 comment.
# Target: 90.
#
# The Makefile's FILE=/GREP= targeted runs append --cov-fail-under=60 on
# the command line, which overrides the floor below — partial runs are
# not held to the full-suite ratchet.
addopts =
    -ra
    --strict-markers
    --strict-config
    -v
    --tb=short
    --timeout=120
    --disable-warnings
    --cov=.
    --cov-branch
    --cov-report=term
    --cov-fail-under=89

# Markers (uses unified set from config/base/pytest.ini)
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    api_integration: API integration tests
    security: Security tests (OWASP Top 10)
    performance: Performance tests
    benchmark: Benchmark tests
    memory: Memory usage tests
    slow: Tests that take > 5 seconds
    sanity: Sanity check tests
    regression: Regression tests
    puppeteer: Puppeteer E2E tests
    database: Tests requiring database
    redis: Tests requiring Redis
    external: Tests requiring external services
    websocket: WebSocket tests
    annotation: Annotation system tests
    api: API endpoint tests
    ml: Machine learning tests
    production: Production workflow tests

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Coverage configuration (inherits from base)
[coverage:run]
source = .
omit = 
    tests/*
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */alembic/*
    setup.py
    */config.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

[coverage:json]
output = coverage.json 