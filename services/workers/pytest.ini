# Workers Service pytest Configuration
# This file extends the unified configuration from /config/base/pytest.ini
# Service-specific overrides can be added below

[pytest]
# Inherit from base configuration - using modern pytest configuration format
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Workers service specific test execution
addopts =
    -ra
    --strict-markers
    --strict-config
    -v
    --tb=short
    --timeout=120
    --disable-warnings

# Markers (uses unified set from config/base/pytest.ini)
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    api_integration: API integration tests
    security: Security tests (OWASP Top 10)
    performance: Performance tests
    benchmark: Benchmark tests
    memory: Memory usage tests
    slow: Tests that take > 5 seconds
    smoke: Quick smoke tests
    sanity: Sanity check tests
    regression: Regression tests
    puppeteer: Puppeteer E2E tests
    database: Tests requiring database
    redis: Tests requiring Redis
    external: Tests requiring external services
    websocket: WebSocket tests
    annotation: Annotation system tests
    api: API endpoint tests
    ml: Machine learning tests
    production: Production workflow tests

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Coverage configuration (inherits from base)
[coverage:run]
source = .
omit = 
    tests/*
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */alembic/*
    setup.py
    */config.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

[coverage:json]
output = coverage.json 