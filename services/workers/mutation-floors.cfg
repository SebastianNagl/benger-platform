# Mutation-score ratchet — the co-gate for the climb-to-95 coverage ratchet.
#
# floor = floor(measured mutation score), per module. A filler test that
# EXECUTES a line without ASSERTing its behavior leaves the line's mutants
# alive, dropping this score — so coverage % cannot be gamed with filler while
# this gate holds. Raise to the new measured integer with every
# test-strengthening PR; never lower without a comment on the program issue.
#
# Mutation score = killed / (killed + survived), timeouts/suspicious excluded
# from the denominator (Stryker convention). Floors start at 0 (inert) until the
# first nightly baseline run sets them to floor(measured). Single source of
# truth — NOT triple-synced (unlike the extended coverage floor).
# 2026-06-15: statistics.py raised 67.65% -> 92.69% (602 mutants, 558 killed,
# 44 survive) via test_statistics_mutation_kills.py + 5 boilerplate pragmas.
# Floor 90 (measured -2.69) absorbs hypothesis-property randomization + CI drift.
[floors]
ml_evaluation/statistics.py = 90
# The 4 below are baselined by the first nightly-mutation run (floor 0 = inert
# until then); each gets set to floor(measured) afterward.
# IAA 2026-06-16: 69% -> 81.31% (674 mutants, 548 killed) via the 56 hand-computed
# kappa/alpha + reliability-cutoff kill tests. The ~126 remaining survivors are
# overwhelmingly interpretation-MESSAGE-string mutants (presentation, not stats) —
# not worth brittle exact-wording assertions. Floor 78 (measured -3.3 margin).
ml_evaluation/inter_annotator_agreement.py = 78
# response_parser / generation_structure_parser / sample_evaluator: property-tested
# + (sample_evaluator) hand-computed metric kills committed; baselined by the
# nightly matrix, which prints floor(measured) to ratchet here.
response_parser.py = 0
generation_structure_parser.py = 0
ml_evaluation/sample_evaluator.py = 0
