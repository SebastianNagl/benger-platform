# Mutation-score ratchet — the co-gate for the climb-to-95 coverage ratchet.
#
# floor = floor(measured mutation score), per module. A filler test that
# EXECUTES a line without ASSERTing its behavior leaves the line's mutants
# alive, dropping this score — so coverage % cannot be gamed with filler while
# this gate holds. Raise to the new measured integer with every
# test-strengthening PR; never lower without a comment on the program issue.
#
# Mutation score = killed / (killed + survived), timeouts/suspicious excluded
# from the denominator (Stryker convention). Floors start at 0 (inert) until the
# first nightly baseline run sets them to floor(measured). Single source of
# truth — NOT triple-synced (unlike the extended coverage floor).
# 2026-06-15: statistics.py raised 67.65% -> 92.69% (602 mutants, 558 killed,
# 44 survive) via test_statistics_mutation_kills.py + 5 boilerplate pragmas.
# Floor 90 (measured -2.69) absorbs hypothesis-property randomization + CI drift.
[floors]
ml_evaluation/statistics.py = 90
# The 4 below are baselined by the first nightly-mutation run (floor 0 = inert
# until then); each gets set to floor(measured) afterward.
# IAA 2026-06-16: 69% -> 81.31% (674 mutants, 548 killed) via the 56 hand-computed
# kappa/alpha + reliability-cutoff kill tests. The ~126 remaining survivors are
# overwhelmingly interpretation-MESSAGE-string mutants (presentation, not stats) —
# not worth brittle exact-wording assertions. Floor 78 (measured -3.3 margin).
ml_evaluation/inter_annotator_agreement.py = 78
# response_parser / generation_structure_parser / sample_evaluator: property-tested
# + hand-computed metric/parse kills committed (test_*_mutation_kills.py, wired
# into the nightly matrix tests: lists); baselined by the nightly matrix, which
# prints floor(measured) to ratchet here.
response_parser.py = 0
generation_structure_parser.py = 0
# llm_judge_evaluator.py (1527 LOC) — LLM-as-judge, central benchmark methodology.
# Hardened 2026-06-16 with 134 kill tests across the pure score-parser/schema
# helpers, the multi-judge consensus/normalization/agreement math, and the
# scoring orchestration (score clamp both ends, evaluate() normalization which had
# ZERO prior direct tests). Found + fixed a real bug: evaluate()/evaluate_multi_judge
# normalization was missing the "0-100" branch the worker's tasks.py ladder + the
# clamp both have, so a 0-100 judge score normalized via (score-1)/4 (100 -> 24.75).
# Floor 0 until the nightly matrix baselines it.
ml_evaluation/llm_judge_evaluator.py = 0
# sample_evaluator 2026-06-16: whole-file 30.33% -> 50.84% (1965 mutants, 999
# killed) after 293 hand-computed deterministic-scoring kills (ranking spearman/
# kendall/ndcg/map, failure+confidence metric-bucket membership, span/hierarchy
# degenerate edges, json-compare, _parse_spans shape, language detection, BLEU
# smoothing-guard) across test_sample_evaluator_kills_{nlg_ranking,scalar_failure,
# spans_hier,json_util_lang}.py. The whole-file number is plumbing-DILUTED: split
# by method, the DETERMINISTIC scoring logic is 88% killed (929/1055) while the
# model-dependent neural/IO PLUMBING (factuality/semantic/entity/bertscore/
# coherence/qags/moverscore/loaders) is 7% killed (64/904) and survives BY DESIGN
# — not unit-assertable without ML models. The ~126 remaining deterministic
# survivors are documented-EQUIVALENT mutants (unreachable branches, no-op
# arithmetic, cosmetic path/label strings) listed inline in the kill files.
# Floor 50 (measured -0.84) gates the whole-file score; the academically
# meaningful signal is the 88% deterministic kill rate.
ml_evaluation/sample_evaluator.py = 50
# NOTE: shared/aggregate_summaries.py (leaderboard math) is NOT a nightly mutmut
# target — it lives under /shared, mounted READ-ONLY in test-workers-runner, so
# mutmut cannot rewrite it in place. Its pure helpers are pinned by hand-computed
# assertion kills (tests/test_aggregate_summaries_kills.py) and the DB-bound
# mean/sum/round + ranking tie-break by tests/integration/
# test_aggregate_summaries_ranking_kills.py — both run in the normal suite and
# count toward coverage, just without a mutation-score ratchet.
