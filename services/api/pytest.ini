# API Service pytest Configuration
# This file extends the unified configuration from /config/base/pytest.ini
# Service-specific overrides can be added below

[tool:pytest]
# Inherit from base configuration
; Use symlink or import mechanism for shared config
; For now, keeping service-specific configuration until migration is complete

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support configuration
asyncio_mode = auto

# API service specific test execution
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --cov-branch
    --cov-fail-under=90
    -v
    --tb=short
    --no-cov-on-fail
    --disable-warnings

# Markers (uses unified set from config/base/pytest.ini)
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    api_integration: API integration tests
    security: Security tests (OWASP Top 10)
    performance: Performance tests
    benchmark: Benchmark tests
    memory: Memory usage tests
    slow: Tests that take > 5 seconds
    smoke: Quick smoke tests
    sanity: Sanity check tests
    regression: Regression tests
    puppeteer: Puppeteer E2E tests
    database: Tests requiring database
    redis: Tests requiring Redis
    external: Tests requiring external services
    websocket: WebSocket tests
    annotation: Annotation system tests
    api: API endpoint tests
    ml: Machine learning tests
    production: Production workflow tests
    health: Health check tests

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Coverage configuration (inherits from base)
[coverage:run]
source = .
omit = 
    tests/*
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */alembic/*
    setup.py
    */config.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

[coverage:json]
output = coverage.json
