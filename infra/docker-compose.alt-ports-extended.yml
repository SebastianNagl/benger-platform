# Standalone compose for running benger-extended-dev on alternate ports.
# Runs alongside old BenGer without port conflicts.
#
# Usage:
#   make dev-alt           -> community edition on ports 9000/9001
#   make dev-alt-extended  -> extended edition on ports 9000/9001
#   make stop-alt          -> stop

name: benger-extended-dev

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "9532:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: benger
    volumes:
      - extended-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "9479:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9101:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../services/api:/app:rw
      - ../services/shared:/shared:ro
    env_file:
      - ../services/api/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URI: postgresql://postgres:changeme@db:5432/benger
      REDIS_URI: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../services/workers
      dockerfile: Dockerfile
      args:
        WORKERS_BASE_IMAGE: ghcr.io/sebastiannagl/benger-platform/workers-base:latest
    restart: unless-stopped
    volumes:
      - ../services/workers:/app:rw
      - ../services/shared:/shared:ro
    env_file:
      - ../services/workers/.env
    environment:
      DATABASE_URI: postgresql://postgres:changeme@db:5432/benger
      REDIS_URI: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import celery; app = celery.Celery(); app.config_from_object(\"tasks\"); app.control.inspect().ping()' 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: ../services/workers
      dockerfile: Dockerfile
      args:
        WORKERS_BASE_IMAGE: ghcr.io/sebastiannagl/benger-platform/workers-base:latest
    restart: unless-stopped
    working_dir: /tmp
    command: sh -c "export PYTHONPATH=/app:$$PYTHONPATH && celery -A tasks beat --loglevel=info"
    volumes:
      - ../services/workers:/app:rw
      - ../services/shared:/shared:ro
    env_file:
      - ../services/workers/.env
    environment:
      DATABASE_URI: postgresql://postgres:changeme@db:5432/benger
      REDIS_URI: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "9280:80"
      - "9290:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--global.sendanonymoususage=false"
      - "--log.level=WARN"

  frontend-dev:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "9100:3000"
    volumes:
      - ../services/frontend:/app:rw
      - /app/node_modules
      - /app/.next
    env_file:
      - ../services/frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9101
      WATCHPACK_POLLING: "true"

volumes:
  extended-dev-postgres-data:
