# Production overrides for BenGER
# Use this file with: helm upgrade --install benger ./benger -f values-production.yaml
#
# PostgreSQL and Redis are managed as standalone Helm releases,
# not as subcharts of the main BenGER chart.
postgresql:
  enabled: false

redis:
  enabled: false

# MinIO object storage (issue #158) — REQUIRED. Inherits enabled=true from
# values.yaml (object storage is the only import/export path; no sync fallback).
# Prod is already live: the benger-minio-credentials Secret exists in the
# `benger` namespace and the server-local values-extended.yaml also pins
# minio.enabled=true. Any prod-specific MinIO overrides would go here; defaults
# from values.yaml (bucket benger-exports, publicHost storage.what-a-benger.net,
# digest-pinned images, 20Gi PVC, 7-day expiry) are correct for prod as-is.

