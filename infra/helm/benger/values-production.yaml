# Production overrides for BenGER
# Use this file with: helm upgrade --install benger ./benger -f values-production.yaml
#
# PostgreSQL and Redis are managed as standalone Helm releases,
# not as subcharts of the main BenGER chart.
postgresql:
  enabled: false

redis:
  enabled: false

# MinIO object storage (issue #158) — intentionally left OFF here so this change
# rides to prod inert. PROMOTION (only after staging validation + creating the
# benger-minio-credentials Secret in the `benger` namespace) = uncomment:
# minio:
#   enabled: true

