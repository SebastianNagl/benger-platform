{{- if .Values.api.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-{{ .Values.api.name }}
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.api.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
  annotations:
    {{- if .Values.middleware.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-api-chain@kubernetescrd
    {{- end }}
    {{- with .Values.api.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: traefik
  {{- if .Values.api.ingress.tls }}
  tls:
    {{- range .Values.api.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.api.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $.Values.api.name }}
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}-{{ .Values.frontend.name }}
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.frontend.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
  annotations:
    {{- if .Values.middleware.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-frontend-chain@kubernetescrd
    {{- end }}
    {{- with .Values.frontend.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: traefik
  {{- if .Values.frontend.ingress.tls }}
  tls:
    {{- range .Values.frontend.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.frontend.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-{{ $.Values.frontend.name }}
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if .Values.vertretbar.enabled }}
# vertretbar.net (prod) / staging.vertretbar.net (staging) → the SAME frontend
# service as the main host. The host is
# student-locked in the frontend and beta-locked by the vertretbar-chain middleware
# (BasicAuth while vertretbar.betaAuth.enabled). Separate Ingress so the beta lock
# and TLS cert scope to this apex only — what-a-benger.net stays open and untouched.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-vertretbar
  labels:
    app: {{ .Release.Name }}-{{ .Values.frontend.name }}
    app.kubernetes.io/name: {{ .Release.Name }}-{{ .Values.frontend.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ .Release.Name }}-vertretbar-chain@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.vertretbar.host | quote }}
      secretName: {{ .Values.vertretbar.tlsSecretName }}
  rules:
    - host: {{ .Values.vertretbar.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-{{ .Values.frontend.name }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
---
{{- if and .Values.minio.enabled .Values.minio.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-minio
  labels:
    app: {{ .Release.Name }}-minio
    app.kubernetes.io/name: {{ .Release.Name }}-minio
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
  annotations:
    # Deliberately NO compression middleware chain: export artifacts are opaque
    # blobs (often already gzipped) and serving large objects via presigned URLs;
    # double-gzip wastes CPU and can break range/streamed downloads.
    {{- with .Values.minio.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ required "minio.publicHost is required when minio.enabled=true" .Values.minio.publicHost | quote }}
      secretName: {{ .Values.global.tlsSecretName }}
  rules:
    - host: {{ .Values.minio.publicHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-minio
                port:
                  number: 9000
{{- end }}
