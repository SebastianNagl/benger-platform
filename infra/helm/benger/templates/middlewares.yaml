{{- if .Values.middleware.enabled }}
# Security headers middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-security-headers
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  headers:
    stsSeconds: {{ .Values.middleware.securityHeaders.stsSeconds | default 300 }}
    stsIncludeSubdomains: {{ .Values.middleware.securityHeaders.stsIncludeSubdomains | default false }}
    stsPreload: {{ .Values.middleware.securityHeaders.stsPreload | default false }}
    contentTypeNosniff: true
    frameDeny: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    customResponseHeaders:
      Server: ""
      X-Powered-By: ""
---
# Compression middleware (API only — Next.js handles frontend compression)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-compress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  compress:
    excludedContentTypes:
      - "text/event-stream"
---
# API middleware chain: security headers + compression
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-api-chain
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  chain:
    middlewares:
      - name: {{ .Release.Name }}-security-headers
      - name: {{ .Release.Name }}-compress
---
# Frontend middleware chain: security headers only
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-frontend-chain
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  chain:
    middlewares:
      - name: {{ .Release.Name }}-security-headers
{{- end }}
{{- if .Values.vertretbar.enabled }}
---
{{- if .Values.vertretbar.betaAuth.enabled }}
# Closed-beta gate for the vertretbar.net host. One shared htpasswd password locks
# the WHOLE host (landing + signup + app) at the edge until public launch. The
# app's own cookie login runs behind it; removeHeader strips the Basic credential
# before proxying so the backend never sees it. Remove by flipping
# vertretbar.betaAuth.enabled=false. The referenced Secret (key: users) must be
# pre-created in the namespace.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-vertretbar-beta-auth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  basicAuth:
    secret: {{ .Values.vertretbar.betaAuth.secretName }}
    removeHeader: true
---
{{- end }}
# vertretbar.net middleware chain: security headers (when enabled) + the beta lock.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-vertretbar-chain
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  chain:
    middlewares:
      {{- if .Values.middleware.enabled }}
      - name: {{ .Release.Name }}-security-headers
      {{- end }}
      {{- if .Values.vertretbar.betaAuth.enabled }}
      - name: {{ .Release.Name }}-vertretbar-beta-auth
      {{- end }}
---
# vertretbar /api/lti chain: security headers only — the beta BasicAuth is
# deliberately absent (LTI server-to-server + cross-site launch POSTs cannot
# answer a BasicAuth challenge; the endpoints carry their own auth). See the
# vertretbar-lti Ingress.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-vertretbar-lti-chain
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  chain:
    middlewares:
      {{- if .Values.middleware.enabled }}
      - name: {{ .Release.Name }}-security-headers
      {{- end }}
{{- end }}
