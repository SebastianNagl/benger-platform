{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-backup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: benger
    app.kubernetes.io/managed-by: helm
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.backup.timeoutSeconds | default 1800 }}
      backoffLimit: {{ .Values.backup.backoffLimit | default 1 }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Release.Name }}-backup
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 0
          containers:
            - name: backup
              image: {{ .Values.backup.image | default "postgres:15-alpine" | quote }}
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: benger-postgres-credentials
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: benger-postgres-credentials
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: benger-postgres-credentials
                      key: username
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: benger-postgres-credentials
                      key: database
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: benger-postgres-credentials
                      key: password
                - name: BACKUP_DIR
                  value: /backups
                - name: RETENTION_DAILY
                  value: {{ .Values.backup.retention.daily | default 7 | quote }}
                - name: RETENTION_WEEKLY
                  value: {{ .Values.backup.retention.weekly | default 4 | quote }}
                - name: RETENTION_MONTHLY
                  value: {{ .Values.backup.retention.monthly | default 6 | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  DAY_OF_WEEK=$(date +%u)
                  DAY_OF_MONTH=$(date +%d)

                  DAILY_DIR="${BACKUP_DIR}/daily"
                  WEEKLY_DIR="${BACKUP_DIR}/weekly"
                  MONTHLY_DIR="${BACKUP_DIR}/monthly"

                  mkdir -p "${DAILY_DIR}" "${WEEKLY_DIR}" "${MONTHLY_DIR}"

                  BACKUP_FILE="${DAILY_DIR}/benger_db_backup_${DATE}.sql.gz"

                  echo "[$(date)] Starting PostgreSQL backup..."
                  echo "[$(date)] Target: ${PGHOST}:${PGPORT}/${PGDATABASE}"

                  pg_dump --no-owner --no-acl | gzip > "${BACKUP_FILE}"

                  BACKUP_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                  echo "[$(date)] Backup created: ${BACKUP_FILE} (${BACKUP_SIZE})"

                  if ! gunzip -t "${BACKUP_FILE}"; then
                    echo "[$(date)] ERROR: Backup failed gzip integrity check!"
                    rm -f "${BACKUP_FILE}"
                    exit 1
                  fi
                  echo "[$(date)] Gzip integrity check passed"

                  LIVE_TABLE_COUNT=$(psql -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';" | tr -d ' \n')
                  DUMP_TABLE_COUNT=$(gunzip -c "${BACKUP_FILE}" | grep -c "^CREATE TABLE " || true)

                  echo "[$(date)] Live database tables: ${LIVE_TABLE_COUNT}"
                  echo "[$(date)] Tables in dump: ${DUMP_TABLE_COUNT}"

                  if [ "${DUMP_TABLE_COUNT}" -lt 5 ]; then
                    echo "[$(date)] ERROR: Dump contains fewer than 5 tables - backup may be incomplete!"
                    exit 1
                  fi

                  # Weekly: copy Sunday's backup
                  if [ "${DAY_OF_WEEK}" = "7" ]; then
                    WEEKLY_FILE="${WEEKLY_DIR}/benger_db_backup_weekly_${DATE}.sql.gz"
                    cp "${BACKUP_FILE}" "${WEEKLY_FILE}"
                    echo "[$(date)] Weekly backup promoted: ${WEEKLY_FILE}"
                  fi

                  # Monthly: copy 1st-of-month backup
                  if [ "${DAY_OF_MONTH}" = "01" ]; then
                    MONTHLY_FILE="${MONTHLY_DIR}/benger_db_backup_monthly_${DATE}.sql.gz"
                    cp "${BACKUP_FILE}" "${MONTHLY_FILE}"
                    echo "[$(date)] Monthly backup promoted: ${MONTHLY_FILE}"
                  fi

                  # Retention cleanup
                  echo "[$(date)] Applying retention policy..."
                  find "${DAILY_DIR}" -name "benger_db_backup_*.sql.gz" -mtime +${RETENTION_DAILY} -delete 2>/dev/null || true
                  find "${WEEKLY_DIR}" -name "benger_db_backup_weekly_*.sql.gz" -mtime +$((RETENTION_WEEKLY * 7)) -delete 2>/dev/null || true
                  find "${MONTHLY_DIR}" -name "benger_db_backup_monthly_*.sql.gz" -mtime +$((RETENTION_MONTHLY * 30)) -delete 2>/dev/null || true

                  DAILY_COUNT=$(find "${DAILY_DIR}" -name "*.sql.gz" | wc -l | tr -d ' ')
                  WEEKLY_COUNT=$(find "${WEEKLY_DIR}" -name "*.sql.gz" | wc -l | tr -d ' ')
                  MONTHLY_COUNT=$(find "${MONTHLY_DIR}" -name "*.sql.gz" | wc -l | tr -d ' ')
                  TOTAL_SIZE=$(du -sh "${BACKUP_DIR}" | cut -f1)

                  echo "[$(date)] Backup complete: daily=${DAILY_COUNT}, weekly=${WEEKLY_COUNT}, monthly=${MONTHLY_COUNT}, total_size=${TOTAL_SIZE}"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  memory: {{ (.Values.backup.resources).requests.memory | default "128Mi" | quote }}
                  cpu: {{ (.Values.backup.resources).requests.cpu | default "100m" | quote }}
                limits:
                  memory: {{ (.Values.backup.resources).limits.memory | default "512Mi" | quote }}
                  cpu: {{ (.Values.backup.resources).limits.cpu | default "500m" | quote }}
          volumes:
            - name: backup-storage
              hostPath:
                path: {{ .Values.backup.hostPath | default "/opt/benger-backups" }}
                type: DirectoryOrCreate
{{- end }}
