global:
  environment: production
  # Use specific image tags for production deployments (e.g., commit hash or semantic version)
  # imageTag: "v1.2.3" # Override this value during deployment
  imagePullSecrets:
    - name: ghcr-secret
  domain: what-a-benger.net
  tlsSecretName: benger-tls

api:
  name: api
  # 2 replicas removes the SPOF — rolling restarts no longer cause downtime.
  # 4 uvicorn workers per replica matches the Dockerfile CMD. Both bumps are
  # safe now that main.py wraps `alembic upgrade` in a Postgres advisory lock
  # (the prior `workers: 1` comment was hiding that startup race).
  # Effective DB pool budget: 2 × 4 × (10 + 20) = 240 slots.
  replicaCount: 2
  workers: 4
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/api
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "200"
      # cert-manager annotation removed: using wildcard Certificate resource
      # in templates/certificates.yaml — no need for per-ingress cert provisioning
    hosts:
      - host: api.what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - api.what-a-benger.net
  resources:
    limits:
      cpu: 1000m
      memory: 3Gi
    requests:
      cpu: 200m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Same value, second name. auth_module.config reads either; docker
    # compose sets JWT_SECRET_KEY and helm historically only set
    # SECRET_KEY, so any module that read JWT_SECRET_KEY directly (e.g.
    # email_verification.py before 2026-05-19) silently fell back to a
    # hardcoded literal in prod. Mount under both names so the next
    # such helper can't slip back into the same gap.
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Pinning the encryption key explicitly decouples it from SECRET_KEY
    # rotations. EncryptionService used to derive the Fernet key from
    # SECRET_KEY via PBKDF2 with a fixed salt — any change to SECRET_KEY
    # silently invalidated every previously stored API key (observed
    # 2026-05-08 with InvalidToken errors on user OpenAI/Google rows).
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    # Schema validation mode for API (can be overridden for staging)
    - name: SCHEMA_VALIDATION_MODE
      value: "strict"
    # SendGrid configuration for production
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"
    - name: COOKIE_DOMAIN
      value: ".what-a-benger.net"

workers:
  name: workers
  replicaCount: 1
  # Default kept at 4 to fit the 12 Gi worker memory limit for evals
  # that load all three embedding-based evaluators (BERTScore +
  # MoverScore + sentence-transformers) — each fork's full RSS reaches
  # ~1.5–2 GB under those workloads (see the resources comment below;
  # the bare ~600 MB figure is just weights, not tokenizer caches +
  # SQLAlchemy buffers + Python overhead).
  #
  # The per-cell fan-out (PR #94) parallelizes evaluation across cells
  # rather than relying on multi-fork concurrency, but for workloads
  # that *don't* load embedding metrics (e.g. ZJS Fälle: llm_judge_
  # falloesung only), operators can safely bump this to 16 to saturate
  # the chord faster:
  #
  #   kubectl patch deployment/benger-workers -n benger --type=json \
  #     -p '[{"op": "replace", "path": "/spec/template/spec/containers/0/command",
  #          "value": ["celery","-A","tasks","worker","--loglevel=info",
  #                    "--concurrency=16","-Q",
  #                    "celery,emails,default,generation,evaluation"]}]'
  #
  # A future change can either (a) auto-tune concurrency by inspecting
  # the config's metric set at orchestrator dispatch, or (b) raise the
  # memory limit to ~24 Gi if the host has headroom (currently 22 Gi
  # total / ~17 Gi free, so a 24 Gi pod wouldn't fit).
  concurrency: 4
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/workers
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    # Embedding-based metrics each load their own ~600MB model into the
    # forked worker process. With BERTScore + MoverScore + semantic
    # similarity active and `concurrency=4` forks, peak resident memory
    # easily reaches ~6-8 GB. The 8Gi limit OOM'd in practice; 12Gi
    # gives headroom for all three loaded simultaneously plus tokenizer
    # caches and SQLAlchemy buffers. Server has 22 Gi total / ~17 Gi
    # free, so 12 Gi fits comfortably.
    limits:
      cpu: 4000m
      memory: 12Gi
    requests:
      cpu: 1000m
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # See api env block above for context on why ENCRYPTION_KEY is pinned.
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: openai_api_key
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: anthropic_api_key
    # SendGrid configuration for workers
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"

frontend:
  name: frontend
  replicaCount: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/frontend
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "100"
      # cert-manager annotation removed: using explicit Certificate resource
      # in templates/certificates.yaml for wildcard support
    hosts:
      - host: what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
      - host: "*.what-a-benger.net"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - what-a-benger.net
          - "*.what-a-benger.net"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: NEXT_PUBLIC_API_URL
      value: "https://api.{{ .Values.global.domain }}"
    - name: INTERNAL_API_URL
      value: "http://benger-api:8000"

# Native annotation system only - Label Studio completely removed

postgresql:
  enabled: true
  image:
    # NOTE: the bitnami/postgresql:15.3.0-debian-11-r17 tag was rewritten by
    # Broadcom post-acquisition to ship Photon OS + PG 18 + FIPS-OpenSSL
    # under the same label. The cluster's data dir is already in PG 18
    # format, so reverting to the original PG 15 content is destructive.
    # See workspace CLAUDE.md → "Postgres image content drift".
    #
    # Earlier attempt to pin by digest (PR #16, sha256:e6d86d16…) used a
    # digest that does not exist on Docker Hub and put prod into
    # ImagePullBackOff. Until we either (a) discover a valid digest for
    # the rewritten image, or (b) migrate to bitnamilegacy/postgresql
    # explicitly, leave the tag floating — it resolves to whatever
    # Broadcom currently ships under this label, which is the
    # PG-18+FIPS variant we've already mitigated for in app code
    # (func.hashtext + pg_dump 18-alpine).
    repository: bitnami/postgresql
    tag: "15.3.0-debian-11-r17"
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    # password: # Generated automatically or set via external secrets
    database: benger
  primary:
    extendedConfiguration: |
      max_connections = 200
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

redis:
  enabled: true
  auth:
    enabled: true
    # password: # Generated automatically or set via external secrets
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Database migrations configuration
# Migrations run as a Helm pre-upgrade/pre-install hook before deployments
migrations:
  # Enable automatic migrations (disable for manual control)
  enabled: true
  # Number of retry attempts on failure
  backoffLimit: 3
  # Timeout in seconds for migration job
  timeoutSeconds: 300
  # Time to keep completed job before cleanup
  ttlSecondsAfterFinished: 300
  # Resource limits for migration job
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Database backup configuration
# Backups run as a K8s CronJob using pg_dump.
# Disabled in prod: host-level backups are configured at the server level
# (178.105.26.90, configured 2026-05-01), which back up the entire data
# volume rather than just pg_dump. Re-enable here only if you need an
# in-cluster logical dump on top of the host snapshots.
backup:
  enabled: false
  # Cron schedule (default: daily at 02:00 UTC)
  schedule: "0 2 * * *"
  # pg_dump version must be >= the running server's major version, otherwise
  # backups silently produce a 0-table dump (we caught this on 2026-04-28 after
  # the server move bumped the runtime binary to PG 18 while the chart still
  # shipped postgres:15-alpine). Keep this in sync with the bitnami postgresql
  # image's actual binary version, not the image tag.
  image: "postgres:18-alpine"
  # Host path on the node to store backups
  hostPath: "/opt/benger-backups"
  # Retention policy
  retention:
    daily: 7
    weekly: 4
    monthly: 6
  backoffLimit: 1
  timeoutSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Traefik middleware configuration
# Creates Middleware CRDs for security headers, compression, etc.
middleware:
  enabled: true
  securityHeaders:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: false