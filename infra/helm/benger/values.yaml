global:
  environment: production
  # Use specific image tags for production deployments (e.g., commit hash or semantic version)
  # imageTag: "v1.2.3" # Override this value during deployment
  imagePullSecrets:
    - name: ghcr-secret
  domain: what-a-benger.net
  tlsSecretName: benger-tls

api:
  name: api
  # 2 replicas removes the SPOF — rolling restarts no longer cause downtime.
  # 4 uvicorn workers per replica matches the Dockerfile CMD. Both bumps are
  # safe now that main.py wraps `alembic upgrade` in a Postgres advisory lock
  # (the prior `workers: 1` comment was hiding that startup race).
  # Effective DB pool budget: 2 × 4 × (10 + 20) = 240 slots.
  replicaCount: 2
  workers: 4
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/api
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "200"
      # cert-manager annotation removed: using wildcard Certificate resource
      # in templates/certificates.yaml — no need for per-ingress cert provisioning
    hosts:
      - host: api.what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - api.what-a-benger.net
  resources:
    limits:
      cpu: 1000m
      memory: 3Gi
    requests:
      cpu: 200m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Same value, second name. auth_module.config reads either; docker
    # compose sets JWT_SECRET_KEY and helm historically only set
    # SECRET_KEY, so any module that read JWT_SECRET_KEY directly (e.g.
    # email_verification.py before 2026-05-19) silently fell back to a
    # hardcoded literal in prod. Mount under both names so the next
    # such helper can't slip back into the same gap.
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Pinning the encryption key explicitly decouples it from SECRET_KEY
    # rotations. EncryptionService used to derive the Fernet key from
    # SECRET_KEY via PBKDF2 with a fixed salt — any change to SECRET_KEY
    # silently invalidated every previously stored API key (observed
    # 2026-05-08 with InvalidToken errors on user OpenAI/Google rows).
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    # Schema validation mode for API (can be overridden for staging)
    - name: SCHEMA_VALIDATION_MODE
      value: "strict"
    # SendGrid configuration for production
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"
    - name: COOKIE_DOMAIN
      value: ".what-a-benger.net"

workers:
  name: workers
  replicaCount: 2
  # Concurrency = number of cell-eval forks per worker pod. Each fork that
  # loads embedding evaluators (BERTScore + MoverScore + sentence-
  # transformers) reaches ~1.5–2 GB RSS; even an llm_judge-only run grows
  # well past the bare ~600 MB of weights once tokenizer caches +
  # SQLAlchemy buffers + Python overhead are counted.
  #
  # The per-cell fan-out (PR #94) already parallelizes evaluation across
  # cells, so concurrency is NOT the throughput lever it looks like —
  # raising it only multiplies peak memory.
  #
  # History on the single 22 Gi node: 2026-05-31 the live deploy was
  # hand-patched to concurrency=8 / 18Gi and kernel-OOM-cascaded the node,
  # taking api + redis down with 503s. Reverting to concurrency=4 with a
  # 6Gi×2 shape STILL OOM-restarted a worker mid-run on an llm_judge-only
  # ZJS Fälle run, and acks_late requeue fanned that restart into a
  # cascade across both replicas. concurrency=2 caps one pod's peak
  # (~3–4 GB under embedding load) safely under the 6Gi limit; 2 replicas
  # × 6Gi = 12 Gi fits the node with room for api/pg/redis. For more
  # throughput add a node or replica — never raise concurrency or memory
  # past what one node's RAM can hold. A future change can auto-tune
  # concurrency from the config's metric set at orchestrator dispatch.
  concurrency: 2
  # Recycle each worker process after this many tasks so leaked memory
  # (SQLAlchemy sessions, response buffers, per-task allocations that
  # aren't freed) is reclaimed instead of accumulating until OOM. Before
  # 2026-05-31 there was no recycling and the worker grew unbounded toward
  # its limit. 20 keeps recycling aggressive enough to hold the leak well
  # under the 6Gi limit; raising it lets peak drift back up under embedding
  # loads.
  maxTasksPerChild: 20
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/workers
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    # Sized together with `concurrency` above, not independently. Each fork
    # under embedding load peaks ~1.5–2 GB; with concurrency=2 a pod's worst
    # case is ~3–4 GB, which sits safely under a 6Gi limit (headroom for
    # tokenizer caches + SQLAlchemy buffers + Python overhead). Two replicas
    # × 6Gi = 12 Gi of the 22 Gi node, leaving room for api/pg/redis.
    # Do NOT raise memory to "buy" more concurrency — a bigger limit just
    # lets one pod consume more of the shared node and re-opens the
    # 2026-05-31 OOM-cascade path. Add a node/replica for throughput instead.
    limits:
      cpu: 6000m
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # See api env block above for context on why ENCRYPTION_KEY is pinned.
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: openai_api_key
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: anthropic_api_key
    # SendGrid configuration for workers
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"

frontend:
  name: frontend
  replicaCount: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/frontend
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "100"
      # cert-manager annotation removed: using explicit Certificate resource
      # in templates/certificates.yaml for wildcard support
    hosts:
      - host: what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
      - host: "*.what-a-benger.net"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - what-a-benger.net
          - "*.what-a-benger.net"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: NEXT_PUBLIC_API_URL
      value: "https://api.{{ .Values.global.domain }}"
    - name: INTERNAL_API_URL
      value: "http://benger-api:8000"

# Native annotation system only - Label Studio completely removed

postgresql:
  enabled: true
  image:
    # NOTE: the bitnami/postgresql:15.3.0-debian-11-r17 tag was rewritten by
    # Broadcom post-acquisition to ship Photon OS + PG 18 + FIPS-OpenSSL
    # under the same label. The cluster's data dir is already in PG 18
    # format, so reverting to the original PG 15 content is destructive.
    # See workspace CLAUDE.md → "Postgres image content drift".
    #
    # Earlier attempt to pin by digest (PR #16, sha256:e6d86d16…) used a
    # digest that does not exist on Docker Hub and put prod into
    # ImagePullBackOff. Until we either (a) discover a valid digest for
    # the rewritten image, or (b) migrate to bitnamilegacy/postgresql
    # explicitly, leave the tag floating — it resolves to whatever
    # Broadcom currently ships under this label, which is the
    # PG-18+FIPS variant we've already mitigated for in app code
    # (func.hashtext + pg_dump 18-alpine).
    repository: bitnami/postgresql
    tag: "15.3.0-debian-11-r17"
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    # password: # Generated automatically or set via external secrets
    database: benger
  primary:
    extendedConfiguration: |
      max_connections = 200
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

redis:
  enabled: true
  auth:
    enabled: true
    # password: # Generated automatically or set via external secrets
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Database migrations configuration
# Migrations run as a Helm pre-upgrade/pre-install hook before deployments
migrations:
  # Enable automatic migrations (disable for manual control)
  enabled: true
  # Number of retry attempts on failure
  backoffLimit: 3
  # Timeout in seconds for migration job
  timeoutSeconds: 300
  # Time to keep completed job before cleanup
  ttlSecondsAfterFinished: 300
  # Resource limits for migration job
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Database backup configuration
# Backups run as a K8s CronJob using pg_dump.
# Disabled in prod: host-level backups are configured at the server level
# (178.105.26.90, configured 2026-05-01), which back up the entire data
# volume rather than just pg_dump. Re-enable here only if you need an
# in-cluster logical dump on top of the host snapshots.
backup:
  enabled: false
  # Cron schedule (default: daily at 02:00 UTC)
  schedule: "0 2 * * *"
  # pg_dump version must be >= the running server's major version, otherwise
  # backups silently produce a 0-table dump (we caught this on 2026-04-28 after
  # the server move bumped the runtime binary to PG 18 while the chart still
  # shipped postgres:15-alpine). Keep this in sync with the bitnami postgresql
  # image's actual binary version, not the image tag.
  image: "postgres:18-alpine"
  # Host path on the node to store backups
  hostPath: "/opt/benger-backups"
  # Retention policy
  retention:
    daily: 7
    weekly: 4
    monthly: 6
  backoffLimit: 1
  timeoutSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# MinIO object storage for async exports/imports (issue #158).
#
# REQUIRED — object storage is a hard dependency for BOTH editions. Import and
# export run exclusively through object storage: there is no synchronous
# fallback and the storage singleton no longer silently downgrades to a local
# /tmp backend (a misconfigured S3 endpoint now crashes the pod at startup
# instead of writing exports to disk). The api+workers receive S3_* env from the
# "benger.storageEnv" helper whenever enabled=true, which is the default.
#
# DEPLOYMENT PRE-REQUISITE: the credentials Secret MUST exist in the target
# namespace before deploy, or the api/workers pods CrashLoop on the missing
# secretKeyRef. Create it once per namespace:
#     kubectl create secret generic benger-minio-credentials -n <ns> \
#       --from-literal=access-key=<user> --from-literal=secret-key=<pass>
#   (the same pair is used as the MinIO root user AND the app's S3 creds).
# The image digests below are multi-arch indexes incl. linux/amd64.
#
# enabled=false is intended only for a local test/dev double (STORAGE_TYPE=local
# reached via tests / bare runs), never for a deployed namespace.
minio:
  enabled: true
  image:
    repository: minio/minio
    # RELEASE.2025-09-07T16-13-09Z — pinned by digest (Bitnami/Broadcom drift lesson).
    digest: "sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e"
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    # RELEASE.2025-08-13T08-35-41Z
    digest: "sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727"
    pullPolicy: IfNotPresent
  storageType: minio
  # Internal cluster endpoint api+workers connect to for the upload itself.
  # Empty → http://<release>-minio:9000.
  internalEndpoint: ""
  bucket: benger-exports
  region: us-east-1
  # Public host that serves browser-bound presigned download URLs. REQUIRED when
  # enabled — SigV4 binds the host, so this is the host the URL is signed for.
  # Covered by the existing wildcard cert (*.what-a-benger.net).
  publicHost: storage.what-a-benger.net
  credentialsSecret: benger-minio-credentials
  accessKeySecretKey: access-key
  secretKeySecretKey: secret-key
  # Object lifecycle. The PVC shares the node's single physical disk with
  # Postgres/WAL/backups, so disk pressure is the real risk: expire finished
  # export artifacts to cap growth.
  expiryDays: 7
  # NOTE: not currently applied. The pinned MinIO release (RELEASE.2025-09-07)
  # rejects an AbortIncompleteMultipartUpload lifecycle action on
  # PutBucketLifecycle (InvalidArgument, verified via both mc and boto3), so the
  # minio-init job ships expiry-only. The export worker aborts its own multipart
  # upload on failure (Phase 2d), leaving only hard-kill orphans — a bounded
  # edge case. Kept here so the rule can be re-enabled if MinIO restores support.
  abortIncompleteMultipartDays: 1
  persistence:
    size: 20Gi
    storageClass: ""  # "" = cluster default StorageClass (local-path on K3s)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "200"

# Traefik middleware configuration
# Creates Middleware CRDs for security headers, compression, etc.
middleware:
  enabled: true
  securityHeaders:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: false