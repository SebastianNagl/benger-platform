global:
  environment: production
  # Use specific image tags for production deployments (e.g., commit hash or semantic version)
  # imageTag: "v1.2.3" # Override this value during deployment
  # Plain strings, NOT {name: ...} maps: the bitnami subcharts (postgresql,
  # redis) stringify map entries into bogus secret names ("map[name:...]").
  # That was latent while their images were public; the postgres image now
  # lives in private GHCR and must authenticate. The platform's own
  # templates accept both forms (see benger.imagePullSecrets helper).
  imagePullSecrets:
    - ghcr-secret
  domain: what-a-benger.net
  tlsSecretName: benger-tls

api:
  name: api
  # 2 replicas removes the SPOF — rolling restarts no longer cause downtime.
  # 4 uvicorn workers per replica matches the Dockerfile CMD. Both bumps are
  # safe now that main.py wraps `alembic upgrade` in a Postgres advisory lock
  # (the prior `workers: 1` comment was hiding that startup race).
  # Effective DB pool budget: 2 × 4 × (10 + 20) = 240 slots.
  replicaCount: 2
  workers: 4
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/api
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "200"
      # cert-manager annotation removed: using wildcard Certificate resource
      # in templates/certificates.yaml — no need for per-ingress cert provisioning
    hosts:
      - host: api.what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - api.what-a-benger.net
  resources:
    limits:
      cpu: 1000m
      memory: 3Gi
    requests:
      cpu: 200m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Same value, second name. auth_module.config reads either; docker
    # compose sets JWT_SECRET_KEY and helm historically only set
    # SECRET_KEY, so any module that read JWT_SECRET_KEY directly (e.g.
    # email_verification.py before 2026-05-19) silently fell back to a
    # hardcoded literal in prod. Mount under both names so the next
    # such helper can't slip back into the same gap.
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # Pinning the encryption key explicitly decouples it from SECRET_KEY
    # rotations. EncryptionService used to derive the Fernet key from
    # SECRET_KEY via PBKDF2 with a fixed salt — any change to SECRET_KEY
    # silently invalidated every previously stored API key (observed
    # 2026-05-08 with InvalidToken errors on user OpenAI/Google rows).
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    # Schema validation mode for API (can be overridden for staging)
    - name: SCHEMA_VALIDATION_MODE
      value: "strict"
    # SendGrid configuration for production
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    # Vertretbar transactional-email identity (host-driven branding, see
    # services/shared/mailer/branding.py). Optional overrides — unset falls
    # back to the code defaults (noreply@vertretbar.net / "Vertretbar"). For
    # real delivery, vertretbar.net must be an authenticated domain in this
    # environment's SendGrid account (the benger-email-config SENDGRID_API_KEY).
    - name: VERTRETBAR_EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: VERTRETBAR_EMAIL_FROM_ADDRESS
          optional: true
    - name: VERTRETBAR_EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: VERTRETBAR_EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"
    - name: COOKIE_DOMAIN
      value: ".what-a-benger.net"
    # Vertretbar student billing (extended). Secrets live in the
    # benger-billing-secrets Secret (pre-create per namespace, like
    # benger-email-config / benger-minio-credentials). optional:true so a
    # deploy without billing configured still boots — the billing surface
    # no-ops and the gate/metering simply don't run.
    - name: BILLING_PROVIDER
      value: "stripe"
    - name: VERTRETBAR_ORG_ID
      value: "06620390-5817-4bc8-b94f-efa0798d5026"  # prod Vertretbar org (seed post-deploy with this id)
    - name: VERTRETBAR_FREE_GRADINGS_PER_WEEK
      value: "1"
    - name: VERTRETBAR_PER_GRADING_PRICE_CENTS
      value: "100"
    - name: VERTRETBAR_FLASHCARD_BILLABLE
      value: "false"
    - name: STRIPE_METER_EVENT_NAME
      value: "exam_grading"
    - name: STRIPE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_secret_key
          optional: true
    - name: STRIPE_WEBHOOK_SECRET
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_webhook_secret
          optional: true
    - name: STRIPE_PRICE_BASE
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_price_base
          optional: true
    - name: STRIPE_PRICE_METERED
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_price_metered
          optional: true

workers:
  name: workers
  replicaCount: 2
  # Concurrency = number of cell-eval forks per worker pod. Each fork that
  # loads embedding evaluators (BERTScore + MoverScore + sentence-
  # transformers) reaches ~1.5–2 GB RSS; even an llm_judge-only run grows
  # well past the bare ~600 MB of weights once tokenizer caches +
  # SQLAlchemy buffers + Python overhead are counted.
  #
  # The per-cell fan-out (PR #94) already parallelizes evaluation across
  # cells, so concurrency is NOT the throughput lever it looks like —
  # raising it only multiplies peak memory.
  #
  # History on the single 22 Gi node: 2026-05-31 the live deploy was
  # hand-patched to concurrency=8 / 18Gi and kernel-OOM-cascaded the node,
  # taking api + redis down with 503s. Reverting to concurrency=4 with a
  # 6Gi×2 shape STILL OOM-restarted a worker mid-run on an llm_judge-only
  # ZJS Fälle run, and acks_late requeue fanned that restart into a
  # cascade across both replicas. concurrency=2 caps one pod's peak
  # (~3–4 GB under embedding load) safely under the 6Gi limit; 2 replicas
  # × 6Gi = 12 Gi fits the node with room for api/pg/redis. For more
  # throughput add a node or replica — never raise concurrency or memory
  # past what one node's RAM can hold. A future change can auto-tune
  # concurrency from the config's metric set at orchestrator dispatch.
  concurrency: 2
  # Recycle each worker process after this many tasks so leaked memory
  # (SQLAlchemy sessions, response buffers, per-task allocations that
  # aren't freed) is reclaimed instead of accumulating until OOM. Before
  # 2026-05-31 there was no recycling and the worker grew unbounded toward
  # its limit. 20 keeps recycling aggressive enough to hold the leak well
  # under the 6Gi limit; raising it lets peak drift back up under embedding
  # loads.
  maxTasksPerChild: 20
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/workers
    pullPolicy: IfNotPresent
    tag: latest
  resources:
    # Sized together with `concurrency` above, not independently. Each fork
    # under embedding load peaks ~1.5–2 GB; with concurrency=2 a pod's worst
    # case is ~3–4 GB, which sits safely under a 6Gi limit (headroom for
    # tokenizer caches + SQLAlchemy buffers + Python overhead). Two replicas
    # × 6Gi = 12 Gi of the 22 Gi node, leaving room for api/pg/redis.
    # Do NOT raise memory to "buy" more concurrency — a bigger limit just
    # lets one pod consume more of the shared node and re-opens the
    # 2026-05-31 OOM-cascade path. Add a node/replica for throughput instead.
    limits:
      cpu: 6000m
      memory: 6Gi
    requests:
      cpu: 1000m
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: ENVIRONMENT
      value: "production"  # IMPORTANT: Must be 'production' for proper authentication
    - name: FRONTEND_URL
      value: "https://{{ .Values.global.domain }}"
    - name: DATABASE_URI
      valueFrom:
        secretKeyRef:
          name: benger-postgres-credentials
          key: uri
    - name: REDIS_URI
      valueFrom:
        secretKeyRef:
          name: benger-redis-credentials
          key: uri
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    - name: JWT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: secret_key
    # See api env block above for context on why ENCRYPTION_KEY is pinned.
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: benger-api-secrets
          key: encryption_key
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: openai_api_key
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-llm-credentials
          key: anthropic_api_key
    # SendGrid configuration for workers
    - name: SENDGRID_API_KEY
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: SENDGRID_API_KEY
          optional: true
    - name: EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_ADDRESS
          optional: true
    - name: EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: EMAIL_FROM_NAME
          optional: true
    # Vertretbar transactional-email identity (host-driven branding, see
    # services/shared/mailer/branding.py). Optional overrides — unset falls
    # back to the code defaults (noreply@vertretbar.net / "Vertretbar"). For
    # real delivery, vertretbar.net must be an authenticated domain in this
    # environment's SendGrid account (the benger-email-config SENDGRID_API_KEY).
    - name: VERTRETBAR_EMAIL_FROM_ADDRESS
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: VERTRETBAR_EMAIL_FROM_ADDRESS
          optional: true
    - name: VERTRETBAR_EMAIL_FROM_NAME
      valueFrom:
        secretKeyRef:
          name: benger-email-config
          key: VERTRETBAR_EMAIL_FROM_NAME
          optional: true
    - name: EMAIL_ENABLED
      value: "true"
    - name: MAIL_ENABLED
      value: "true"
    # Vertretbar billing (extended): the worker applies the grading dispatch
    # policy (tier judge model + vertretbar-org key routing) and settles the
    # metered ledger at task end, so it needs the same billing env as the api.
    # Secrets are optional — an absent secret leaves billing a no-op. The beat
    # deployment inherits this env block.
    - name: BILLING_PROVIDER
      value: "stripe"
    - name: VERTRETBAR_ORG_ID
      value: "06620390-5817-4bc8-b94f-efa0798d5026"  # prod Vertretbar org
    - name: VERTRETBAR_FREE_GRADINGS_PER_WEEK
      value: "1"
    - name: VERTRETBAR_PER_GRADING_PRICE_CENTS
      value: "100"
    - name: VERTRETBAR_FLASHCARD_BILLABLE
      value: "false"
    - name: STRIPE_METER_EVENT_NAME
      value: "exam_grading"
    - name: STRIPE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_secret_key
          optional: true
    - name: STRIPE_PRICE_BASE
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_price_base
          optional: true
    - name: STRIPE_PRICE_METERED
      valueFrom:
        secretKeyRef:
          name: benger-billing-secrets
          key: stripe_price_metered
          optional: true

# Celery beat scheduler (deployment-beat.yaml). Single-replica process that
# fires the periodic schedule in tasks.py (app.conf.beat_schedule), e.g.
# recompute-aggregates. Reuses the workers image + env. Keep replicas at 1
# (enforced in the template) — a second beat double-dispatches every
# scheduled task. Lightweight: it only dispatches tasks to the broker; the
# actual work runs on the workers.
beat:
  enabled: true
  name: beat
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi

frontend:
  name: frontend
  replicaCount: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  image:
    repository: ghcr.io/sebastiannagl/benger/frontend
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "100"
      # cert-manager annotation removed: using explicit Certificate resource
      # in templates/certificates.yaml for wildcard support
    hosts:
      - host: what-a-benger.net
        paths:
          - path: /
            pathType: Prefix
      - host: "*.what-a-benger.net"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: benger-tls
        hosts:
          - what-a-benger.net
          - "*.what-a-benger.net"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  env:
    - name: NEXT_PUBLIC_API_URL
      value: "https://api.{{ .Values.global.domain }}"
    - name: INTERNAL_API_URL
      value: "http://benger-api:8000"

# Native annotation system only - Label Studio completely removed

postgresql:
  enabled: true
  image:
    # PINNED (2026-06-10): Postgres 18.3 + Photon OS + FIPS-OpenSSL is the
    # official baseline. History: Broadcom rewrote the
    # bitnami/postgresql:15.3.0-debian-11-r17 tag post-acquisition to ship
    # this PG-18 content, the cluster's data dir is in PG 18 format ever
    # since, and the tag has now been DELETED from Docker Hub entirely —
    # prod survived only on the node's containerd cache. The running image
    # (manifest list sha256:d0fd908d…) was copied byte-identical to the
    # project's own GHCR so it can never be purged or rewritten upstream.
    # bitnamilegacy/postgresql:15.3.0-… archives the ORIGINAL Debian-11 /
    # PG 15.3 build — do NOT switch to it, PG 15 binaries cannot open the
    # PG 18 data dir. App-side FIPS mitigations (func.hashtext, pg_dump
    # 18-alpine) stay. See workspace CLAUDE.md → "Postgres image content
    # drift". The earlier pin attempt (PR #16, sha256:e6d86d16…) failed
    # because that value is the image CONFIG digest (crictl `id`), not the
    # pullable manifest-list digest.
    registry: ghcr.io
    repository: sebastiannagl/benger-extended/postgresql
    tag: "pg18.3-photon-fips"
    digest: "sha256:d0fd908dfe8697467f930c1894fcdbbbbd093e3dcf104204a00121ffef017749"
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    # password: # Generated automatically or set via external secrets
    database: benger
  primary:
    extendedConfiguration: |
      max_connections = 200
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

redis:
  enabled: true
  auth:
    enabled: true
    # password: # Generated automatically or set via external secrets
  replica:
    replicaCount: 0
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Database migrations configuration
# Migrations run as a Helm pre-upgrade/pre-install hook before deployments
migrations:
  # Enable automatic migrations (disable for manual control)
  enabled: true
  # Number of retry attempts on failure
  backoffLimit: 3
  # Timeout in seconds for migration job
  timeoutSeconds: 300
  # Time to keep completed job before cleanup
  ttlSecondsAfterFinished: 300
  # Resource limits for migration job
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Database backup configuration
# Backups run as a K8s CronJob using pg_dump.
# Disabled in prod: disaster recovery is hosting-provider server snapshots
# of the whole machine, taken every few hours (confirmed 2026-06-10). No
# host-level cron/systemd backup job exists on the server — the last
# in-cluster pg_dump under /opt/benger-backups is from 2026-05-01, when this
# CronJob was switched off. Re-enable here only if you additionally want an
# in-cluster logical dump (e.g. for point-in-time restores finer than the
# snapshot cadence, or to migrate data off the box).
backup:
  enabled: false
  # Cron schedule (default: daily at 02:00 UTC)
  schedule: "0 2 * * *"
  # pg_dump version must be >= the running server's major version, otherwise
  # backups silently produce a 0-table dump (we caught this on 2026-04-28 after
  # the server move bumped the runtime binary to PG 18 while the chart still
  # shipped postgres:15-alpine). Keep this in sync with the bitnami postgresql
  # image's actual binary version, not the image tag.
  image: "postgres:18-alpine"
  # Host path on the node to store backups
  hostPath: "/opt/benger-backups"
  # Retention policy
  retention:
    daily: 7
    weekly: 4
    monthly: 6
  backoffLimit: 1
  timeoutSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# MinIO object storage for async exports/imports (issue #158).
#
# REQUIRED — object storage is a hard dependency for BOTH editions. Import and
# export run exclusively through object storage: there is no synchronous
# fallback and the storage singleton no longer silently downgrades to a local
# /tmp backend (a misconfigured S3 endpoint now crashes the pod at startup
# instead of writing exports to disk). The api+workers receive S3_* env from the
# "benger.storageEnv" helper whenever enabled=true, which is the default.
#
# DEPLOYMENT PRE-REQUISITE: the credentials Secret MUST exist in the target
# namespace before deploy, or the api/workers pods CrashLoop on the missing
# secretKeyRef. Create it once per namespace:
#     kubectl create secret generic benger-minio-credentials -n <ns> \
#       --from-literal=access-key=<user> --from-literal=secret-key=<pass>
#   (the same pair is used as the MinIO root user AND the app's S3 creds).
# The image digests below are multi-arch indexes incl. linux/amd64.
#
# enabled=false is intended only for a local test/dev double (STORAGE_TYPE=local
# reached via tests / bare runs), never for a deployed namespace.
minio:
  enabled: true
  image:
    repository: minio/minio
    # RELEASE.2025-09-07T16-13-09Z — pinned by digest (Bitnami/Broadcom drift lesson).
    digest: "sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e"
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    # RELEASE.2025-08-13T08-35-41Z
    digest: "sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727"
    pullPolicy: IfNotPresent
  storageType: minio
  # Internal cluster endpoint api+workers connect to for the upload itself.
  # Empty → http://<release>-minio:9000.
  internalEndpoint: ""
  bucket: benger-exports
  region: us-east-1
  # Public host that serves browser-bound presigned download URLs. REQUIRED when
  # enabled — SigV4 binds the host, so this is the host the URL is signed for.
  # Covered by the existing wildcard cert (*.what-a-benger.net).
  publicHost: storage.what-a-benger.net
  credentialsSecret: benger-minio-credentials
  accessKeySecretKey: access-key
  secretKeySecretKey: secret-key
  # Object lifecycle. The PVC shares the node's single physical disk with
  # Postgres/WAL/backups, so disk pressure is the real risk: expire finished
  # export artifacts to cap growth.
  expiryDays: 7
  # NOTE: not currently applied. The pinned MinIO release (RELEASE.2025-09-07)
  # rejects an AbortIncompleteMultipartUpload lifecycle action on
  # PutBucketLifecycle (InvalidArgument, verified via both mc and boto3), so the
  # minio-init job ships expiry-only. The export worker aborts its own multipart
  # upload on failure (Phase 2d), leaving only hard-kill orphans — a bounded
  # edge case. Kept here so the rule can be re-enabled if MinIO restores support.
  abortIncompleteMultipartDays: 1
  persistence:
    size: 20Gi
    storageClass: ""  # "" = cluster default StorageClass (local-path on K3s)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.priority: "200"

# Traefik middleware configuration
# Creates Middleware CRDs for security headers, compression, etc.
middleware:
  enabled: true
  securityHeaders:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: false

# Vertretbar student product — serves the (already host-wired) student view on a
# second branded apex from THIS same release, no separate backend. A neutral
# open-core hook: the frontend already recognizes vertretbar.net
# (STUDENT_LOCKED_DOMAINS in services/frontend/src/lib/utils/subdomain.ts) and the
# Next proxy already scopes auth cookies to it (BASE_DOMAINS), so serving the host
# needs no app code — only this ingress + its own TLS cert.
#
# Rendered when `enabled` (default off, so the open-core base and any deploy that
# doesn't opt in stay inert). Host + cert are per-environment via the overlays:
# this base is the prod default (vertretbar.net); values-staging.yaml overrides to
# staging.vertretbar.net. Turn it on in the environment overlay you want it in
# (values-staging.yaml for the staging beta; this file / values-extended.yaml for
# the prod go-live).
vertretbar:
  enabled: true  # prod go-live (staging keeps its own host via values-staging.yaml)
  host: vertretbar.net
  # Own cert: the *.what-a-benger.net wildcard does not cover a different apex.
  # Issued via HTTP-01 (letsencrypt-prod-http01), NOT the Cloudflare DNS-01 issuer
  # used for the wildcard — vertretbar.net lives on external DNS (Namecheap) with
  # no Cloudflare zone, so DNS-01 can't create its TXT record. HTTP-01 just needs
  # the A record + Traefik. cert issues once the A record resolves.
  tlsSecretName: vertretbar-tls
  certIssuer: letsencrypt-prod-http01
  # Closed-beta gate: a Traefik BasicAuth middleware locks the WHOLE host behind one
  # shared password until public launch — flip enabled:false to remove it in one
  # step. Compatible with the app's cookie-only auth (the browser sends
  # Authorization: Basic; the backend authenticates via the session cookie). The
  # htpasswd Secret must be pre-created in the namespace (key: users), like the
  # other pre-created secrets:
  #   htpasswd -nbB beta '<password>' | kubectl -n benger create secret generic \
