# Development overrides for docker-compose.yml
# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

name: benger
version: '3.8'

services:
  # API Development Configuration - Hot Reload with Optimizations
  api:
    command: [
      "uvicorn", "main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--reload",
      "--reload-include", "*.py",
      "--reload-exclude", "tests/*",
      "--reload-exclude", "alembic/*",
      "--reload-exclude", "scripts/*",
      "--reload-exclude", "htmlcov/*",
      "--reload-exclude", "templates/*",
      "--reload-exclude", "localization/*",
      "--reload-exclude", "init_complete.py",
      "--reload-exclude", "*.pyc",
      "--reload-exclude", "__pycache__",
      "--reload-exclude", ".pytest_cache",
      "--reload-exclude", ".coverage",
      "--reload-exclude", "coverage.*",
      "--reload-exclude", "test.db",
      "--reload-delay", "3",
      "--timeout-graceful-shutdown", "3"
    ]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Override to read-write for development hot reload
      - ../services/api:/app:rw
    environment:
      # Development specific settings
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1  # Prevent .pyc files from triggering reloads
      # Local email: route SendGrid sends to the in-stack mail catcher (there
      # is no verified sender for localhost). View captured mails, incl. the
      # verify/reset links, at http://localhost:8026. Override in .env to hit
      # real SendGrid.
      SENDGRID_API_URL: ${SENDGRID_API_URL:-http://benger-mailsink:8025/v3/mail/send}
      # Object storage (MinIO) — async export/import (#158). Uploads use the
      # internal endpoint; browser-bound presigned download URLs are signed for
      # STORAGE_BASE_URL, the host the browser actually reaches.
      STORAGE_TYPE: minio
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-bengerdev}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bengerdevsecret}
      S3_BUCKET_NAME: benger-exports
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      STORAGE_BASE_URL: http://localhost:9000

  # Frontend Development Configuration  
  frontend-dev:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.dev
    hostname: frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"  # Direct access for development
    env_file:
      - ../services/frontend/.env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_NODE_ENV: development
      NEXT_PUBLIC_DISABLE_AUTO_LOGIN: ${DISABLE_AUTO_LOGIN:-false}
      # Don't set NEXT_PUBLIC_API_URL - let it use the proxy at /api
      WATCHPACK_POLLING: true  # Better file watching in Docker
      WATCHPACK_POLLING_INTERVAL: 2000  # Poll every 2s to reduce load
      CHOKIDAR_INTERVAL: 2000  # Reduce file watching frequency
      CHOKIDAR_USEPOLLING: true
      # Disable React Strict Mode in development to prevent double renders
      NEXT_PUBLIC_REACT_STRICT_MODE: false
      # Optimize Next.js compilation
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_BUILD_OUTPUT_TRACE: false
      # Give the dev server enough V8 heap that on-demand compilation of heavy
      # routes (Klausuren/Milkdown editor) plus long-lived SSE streams
      # (/api/notifications/stream) don't push heap past the /api/health 80%
      # memory warning. The health route reads this same value as its limit;
      # keeping them equal (and below the container memory limit) means the
      # "unhealthy" flap that dropped frontend-dev out of traefik ("no
      # available server") no longer happens on a normal dev session.
      NODE_OPTIONS: "--max-old-space-size=3072"
    volumes:
      - ../services/frontend:/app:rw
      - /app/node_modules  # Anonymous volume for node_modules
      - /app/.next  # Anonymous volume for Next.js cache
      # Note: Cannot exclude individual files with Docker volumes
    networks:
      - benger-network
    labels:
      - "traefik.enable=true"
      
      # Main frontend route with wildcard subdomain support (benger + vertretbar)
      - "traefik.http.routers.frontend-dev.rule=Host(`benger.localhost`) || Host(`vertretbar.localhost`) || HostRegexp(`^[a-z0-9-]+\\.benger\\.localhost$$`) || HostRegexp(`^[a-z0-9-]+\\.vertretbar\\.localhost$$`)"
      - "traefik.http.routers.frontend-dev.entrypoints=web"
      - "traefik.http.routers.frontend-dev.priority=200"
      - "traefik.http.routers.frontend-dev.service=frontend-dev"

      # Critical: SSE route with highest priority to override backend API routes
      - "traefik.http.routers.frontend-dev-sse.rule=(Host(`benger.localhost`) || Host(`vertretbar.localhost`) || HostRegexp(`^[a-z0-9-]+\\.benger\\.localhost$$`) || HostRegexp(`^[a-z0-9-]+\\.vertretbar\\.localhost$$`)) && PathPrefix(`/api/notifications/stream`)"
      - "traefik.http.routers.frontend-dev-sse.entrypoints=web"
      - "traefik.http.routers.frontend-dev-sse.priority=300"
      - "traefik.http.routers.frontend-dev-sse.service=frontend-dev"
      
      # Service definition
      - "traefik.http.services.frontend-dev.loadbalancer.server.port=3000"
      - "traefik.http.services.frontend-dev.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.frontend-dev.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.frontend-dev.loadbalancer.healthcheck.timeout=10s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          # 4G (was 3G) leaves RSS headroom above the 3072MB V8 heap cap so
          # the container isn't OOM-killed during heavy dev compilation.
          memory: 4G
        reservations:
          memory: 1G

  # Worker Development Configuration - Volume mount for source code
  worker:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ../services/workers:/app:rw
      - ../services/shared:/shared:rw
    environment:
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
      # Local email: the send path runs on the worker → route it to the mail
      # catcher too (http://localhost:8026). Override in .env for real SendGrid.
      SENDGRID_API_URL: ${SENDGRID_API_URL:-http://benger-mailsink:8025/v3/mail/send}
      # Object storage (MinIO) — the worker streams the multipart upload (#158).
      STORAGE_TYPE: minio
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-bengerdev}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bengerdevsecret}
      S3_BUCKET_NAME: benger-exports
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      STORAGE_BASE_URL: http://localhost:9000

  # Disable production frontend in development to avoid conflicts
  frontend:
    deploy:
      replicas: 0

  # MinIO — S3-compatible object storage for async export/import (#158).
  # Mirrors the prod Helm deployment (same digest-pinned images, same bucket +
  # lifecycle rules). Internal S3 endpoint is minio:9000 (uploads); the browser
  # reaches presigned download URLs via the published localhost:9000.
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e  # RELEASE.2025-09-07T16-13-09Z
    hostname: minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"  # S3 API — published so the browser can fetch presigned URLs
      - "9001:9001"  # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bengerdev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bengerdevsecret}
      # Public host the browser uses; SigV4 binds the host of presigned URLs.
      MINIO_SERVER_URL: http://localhost:9000
    volumes:
      - minio-data:/data
    networks:
      - benger-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # One-shot bucket + lifecycle bootstrap (mirrors the prod job-minio-init hook).
  # Waits for the server, creates the exports bucket, imports the 7-day export
  # expiry rule. Idempotent on re-run (mc ilm import replaces the whole config).
  #
  # NOTE: We deliberately do NOT set an AbortIncompleteMultipartUpload lifecycle
  # rule. The pinned MinIO release (RELEASE.2025-09-07) rejects that action on
  # PutBucketLifecycle with InvalidArgument regardless of client (verified
  # against both mc and boto3). The export worker already calls
  # abort_multipart_upload() on its failure path (#158, Phase 2d), so orphaned
  # parts only survive a hard-kill (OOM/SIGKILL) of the worker mid-upload — a
  # bounded, minor storage-cost edge case. Revisit if MinIO restores the action.
  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727  # RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bengerdev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bengerdevsecret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MinIO ..."
        i=0
        while [ "$$i" -lt 60 ]; do
          if mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1 && mc ready local >/dev/null 2>&1; then
            echo "MinIO is ready."
            break
          fi
          i=$$((i + 1))
          echo "  ... not ready yet ($$i)"
          sleep 2
        done
        mc mb --ignore-existing local/benger-exports
        echo '{"Rules":[{"ID":"expire-exports","Status":"Enabled","Filter":{},"Expiration":{"Days":7}}]}' | mc ilm import local/benger-exports
        echo "MinIO bucket + lifecycle initialized."
        mc ilm rule ls local/benger-exports || true
    networks:
      - benger-network

  # Local mail catcher (dev only): implements the SendGrid /v3/mail/send
  # contract so transactional emails (signup verification, password reset,
  # invitations) are captured instead of sent — no verified sender needed on
  # localhost. View them, with clickable verify/reset links, at
  # http://localhost:8026. api + worker point SENDGRID_API_URL here in dev.
  mailsink:
    image: python:3.11-slim
    container_name: benger-mailsink
    command: python /mailsink.py
    volumes:
      - ./mailsink/mailsink.py:/mailsink.py:ro
    ports:
      - "8026:8025"
    restart: unless-stopped
    networks:
      - benger-network

volumes:
  minio-data:
    driver: local