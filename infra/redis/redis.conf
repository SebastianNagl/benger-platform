# Redis Configuration for BenGer
# Security
bind 0.0.0.0
protected-mode yes
port 6379

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Performance
timeout 300
tcp-keepalive 60
tcp-backlog 511

# Logging
loglevel notice
syslog-enabled no

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128 