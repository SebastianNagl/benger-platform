# Extended edition test overrides
# Mounts benger-extended into test containers so @extended E2E tests work.
#
# Usage (from repo root):
#   DOCKER_COMPOSE_TEST="docker compose -f infra/docker-compose.test.yml -f infra/docker-compose.test.extended.yml" make test-start
#
# Requires: benger-extended repo at ../benger-extended (sibling directory)

services:
  test-api:
    volumes:
      - ../../benger-extended/benger_extended:/app/benger_extended:ro
    environment:
      BENGER_EDITION: extended

  test-worker:
    volumes:
      - ../../benger-extended/benger_extended:/app/benger_extended:ro
    environment:
      BENGER_EDITION: extended

  test-frontend:
    volumes:
      - ../../benger-extended/frontend:/app/benger-extended-frontend:ro
    environment:
      NEXT_PUBLIC_BENGER_EDITION: extended
