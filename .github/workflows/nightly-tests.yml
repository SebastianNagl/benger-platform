name: Nightly Tests

# Comprehensive test suite — runs ALL tests (API, Workers, Frontend, E2E).
# PR CI only runs frontend Jest + Python lint for fast feedback.
# This nightly suite catches regressions within 24 hours.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  nightly:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell /usr/local/share/chromium || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: services/frontend
        run: npx playwright install chromium --with-deps

      - name: Add test hostname
        run: echo "127.0.0.1 benger-test.localhost" | sudo tee -a /etc/hosts

      - name: Build and start test infrastructure
        run: make test-build
        timeout-minutes: 20

      - name: Seed test database
        run: make test-seed

      - name: Run unit tests (API + Workers + Frontend)
        run: make test-unit
        timeout-minutes: 40

      - name: Run E2E tests
        run: make test-e2e
        timeout-minutes: 40

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-playwright-report
          path: services/frontend/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          make test-stop 2>/dev/null || true
          docker image prune -f || true

      - name: Create or update issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing (${date}).\n\n**Run:** ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly test suite failure',
              labels: ['bug', 'nightly-failure'],
              body: `Nightly test suite failed on ${date}.\n\n**Run:** ${runUrl}\n\nInvestigate before merging new PRs.`,
            });
