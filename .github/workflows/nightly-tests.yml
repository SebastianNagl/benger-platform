name: Nightly Tests

# Comprehensive test suite — runs ALL tests (API, Workers, Frontend, E2E).
# PR CI only runs frontend Jest + Python lint for fast feedback.
# This nightly suite catches regressions within 24 hours.
#
# Each slice runs in its own matrix shard so a single slow suite
# (typically API at ~36 min on real Postgres) doesn't starve the others
# or trip the per-step timeout. Frontend Jest skips Docker entirely.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  nightly:
    name: ${{ matrix.shard }}
    runs-on: ubuntu-latest
    # Sized for the e2e shard: Playwright's globalTimeout is 90 min in
    # isolated mode (workers=1), and the surrounding setup/teardown
    # adds ~10–15 min, so 120 min gives real headroom.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [api, workers, frontend, e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        if: matrix.shard != 'frontend'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell /usr/local/share/chromium || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        # One retry covers the transient registry-side ECONNRESET observed
        # on 2026-04-30 (npm error code ECONNRESET during fetch from
        # registry.npmjs.org). A persistent registry outage will still
        # fail the shard loudly after the second attempt.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          command: cd services/frontend && npm ci

      - name: Install Playwright Chromium
        if: matrix.shard == 'e2e'
        working-directory: services/frontend
        run: npx playwright install chromium --with-deps

      - name: Add test hostname
        if: matrix.shard == 'e2e'
        run: echo "127.0.0.1 benger-test.localhost" | sudo tee -a /etc/hosts

      - name: Build test infrastructure
        if: matrix.shard != 'frontend'
        # `make test-build` swallows docker-build failures (it pipes the
        # output through `grep -v ... || true`), so wrap with retry to
        # absorb transient build crashes (e.g. @swc/core SIGBUS during
        # in-container npm ci) and re-verify health below.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_wait_seconds: 30
          command: make test-build

      - name: Verify test infrastructure is up
        if: matrix.shard != 'frontend'
        # Fail loudly if the silent build above didn't actually start the
        # api container, instead of cascading into a confusing seed error.
        run: |
          if ! docker ps --format '{{.Names}}' | grep -q '^benger-test-test-api-1$'; then
            echo "::error::test-api container did not come up after make test-build"
            docker compose -f infra/docker-compose.test.yml ps
            exit 1
          fi

      - name: Seed test database
        if: matrix.shard != 'frontend'
        run: make test-seed

      - name: Run ${{ matrix.shard }} tests
        run: |
          case "${{ matrix.shard }}" in
            api)      make test-api ;;
            workers)  make test-workers ;;
            frontend) make test-frontend ;;
            e2e)      make test-e2e ;;
          esac
        # E2E in isolated mode runs 200+ specs serially (workers=1) with
        # a 90-min Playwright globalTimeout, so the step needs at least
        # that plus a safety margin.
        timeout-minutes: 100

      - name: Upload Playwright report
        if: matrix.shard == 'e2e' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: services/frontend/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always() && matrix.shard != 'frontend'
        run: |
          make test-stop 2>/dev/null || true
          docker image prune -f || true

  report:
    name: Report failure
    needs: nightly
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing (${date}).\n\n**Run:** ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly test suite failure',
              labels: ['bug', 'nightly-failure'],
              body: `Nightly test suite failed on ${date}.\n\n**Run:** ${runUrl}\n\nInvestigate before merging new PRs.`,
            });
