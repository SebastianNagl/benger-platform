name: Nightly Tests

# Comprehensive nightly test suite — runs ALL tests (API, Workers, Frontend, E2E + @extended).
# PR CI only runs smoke tests and frontend Jest for fast feedback (~20 min).
# This nightly suite catches regressions within 24 hours.

on:
  schedule:
    - cron: "0 1 * * *"  # 1:00 AM UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  issues: write

env:
  REGISTRY: ghcr.io

jobs:
  nightly:
    name: Nightly Comprehensive Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell /usr/local/share/chromium || true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: services/frontend
        run: npx playwright install chromium --with-deps

      - name: Add test hostname
        run: echo "127.0.0.1 benger-test.localhost" | sudo tee -a /etc/hosts

      - name: Run comprehensive tests
        env:
          CI: true
        timeout-minutes: 170
        run: make test-extended

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: nightly-playwright-report
          path: services/frontend/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          cd infra && docker compose -f docker-compose.test.yml down -v --remove-orphans 2>/dev/null || true
          docker image prune -f || true

      - name: Create or update issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              console.log(`Adding comment to existing issue #${issue.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Still failing (${date}).\n\n**Run:** ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly test suite failure',
              labels: ['bug', 'nightly-failure'],
              body: `Nightly test suite failed on ${date}.\n\n**Run:** ${runUrl}\n\nInvestigate before merging new PRs.`,
            });
