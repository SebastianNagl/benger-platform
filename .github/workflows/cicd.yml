name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [extended-updated]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test suite'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.head_ref) || 'deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sebastiannagl/benger-platform

jobs:
  # ============================================================
  # BUILD: Build extended Docker images (core + extended baked in)
  # ============================================================
  build:
    name: Build Extended Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout platform
        uses: actions/checkout@v4

      - name: Checkout extended
        uses: actions/checkout@v4
        with:
          repository: SebastianNagl/benger-extended
          token: ${{ secrets.EXTENDED_REPO_TOKEN }}
          path: benger-extended

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-$(echo ${{ github.sha }} | head -c 7)"
          else
            TAG="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | head -c 7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          cp -r benger-extended/benger_extended services/api/benger_extended
          docker build -t $REGISTRY/$IMAGE_NAME/api:${{ steps.meta.outputs.tag }} services/api
          docker push $REGISTRY/$IMAGE_NAME/api:${{ steps.meta.outputs.tag }}
          rm -rf services/api/benger_extended

      - name: Build and push Workers image
        run: |
          cp -r benger-extended/benger_extended services/workers/benger_extended
          docker build -t $REGISTRY/$IMAGE_NAME/workers:${{ steps.meta.outputs.tag }} services/workers
          docker push $REGISTRY/$IMAGE_NAME/workers:${{ steps.meta.outputs.tag }}
          rm -rf services/workers/benger_extended

      - name: Build and push Frontend image
        run: |
          mkdir -p services/frontend/node_modules/@benger/extended
          cp -r benger-extended/frontend/* services/frontend/node_modules/@benger/extended/
          docker build \
            --build-arg NEXT_PUBLIC_BENGER_EDITION=extended \
            -t $REGISTRY/$IMAGE_NAME/frontend:${{ steps.meta.outputs.tag }} \
            services/frontend
          docker push $REGISTRY/$IMAGE_NAME/frontend:${{ steps.meta.outputs.tag }}
          rm -rf services/frontend/node_modules/@benger/extended

  # ============================================================
  # DEPLOY TO PRODUCTION: on push to main
  # ============================================================
  deploy-prod:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch')
    runs-on: [self-hosted, deploy]
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          echo "Deploying $TAG to production"

          cd infra/helm/benger
          helm dependency update .

          helm upgrade --install benger . \
            --namespace benger \
            -f values.yaml \
            -f values-extended.yaml \
            --set api.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api \
            --set api.image.tag=$TAG \
            --set api.image.pullPolicy=Always \
            --set workers.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/workers \
            --set workers.image.tag=$TAG \
            --set workers.image.pullPolicy=Always \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend \
            --set frontend.image.tag=$TAG \
            --set frontend.image.pullPolicy=Always \
            --wait --timeout=10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/benger-api -n benger --timeout=120s
          kubectl exec deployment/benger-api -n benger -- curl -sf localhost:8000/health

  # ============================================================
  # DEPLOY TO STAGING: on PRs
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 15
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          echo "Deploying $TAG to staging"

          cd infra/helm/benger
          helm dependency update .

          helm upgrade --install benger-staging . \
            --namespace benger-staging \
            -f values.yaml \
            -f values-staging.yaml \
            -f values-extended.yaml \
            --set api.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api \
            --set api.image.tag=$TAG \
            --set api.image.pullPolicy=Always \
            --set workers.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/workers \
            --set workers.image.tag=$TAG \
            --set workers.image.pullPolicy=Always \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend \
            --set frontend.image.tag=$TAG \
            --set frontend.image.pullPolicy=Always \
            --wait --timeout=10m
